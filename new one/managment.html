<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #1f1f2e, #29293f);
            color: #fff;
            display: flex;
        }

        .navbar {
            width: 250px;
            background: linear-gradient(to bottom, #3e3e50, #2a2a38);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            box-shadow: 2px 0 6px rgba(0, 0, 0, 0.3);
            position: fixed;
            left: 0;
            top: 0;
        }

        .navbar .header {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        .navbar a {
            text-decoration: none;
            color: #fff;
            padding: 10px 20px;
            margin: 10px 0;
            transition: background-color 0.3s, transform 0.2s;
            border-radius: 8px;
            width: 80%;
            text-align: center;
        }

        .navbar a:hover {
            background-color: #575757;
            transform: scale(1.05);
        }

        .main-content {
            margin-left: 250px;
            padding: 20px;
            width: calc(100% - 250px);
        }

        h2 {
            color: #dddddd;
            border-bottom: 2px solid #575757;
            padding-bottom: 5px;
            border-radius: 5px;
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        section {
            margin-bottom: 20px;
            background: #3a3a3a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #444444;
            color: #fff;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #575757;
            border-radius: 5px;
        }

        table th {
            background-color: #555555;
            color: #fff;
        }

        .table-heading {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #f0f0f0;
            margin-bottom: 10px;
        }

        .chart-container {
            margin-top: 20px;
            padding: 20px;
            background: #4a4a4a;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .button-group button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background-color: #575757;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button-group button:hover {
            background-color: #6b6b6b;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="navbar">
        <div class="header">Random Admin</div>
        <a href="user-view.html">User View</a>
        <a href="user-management.html">User Management</a>
        <a href="about.html">About</a>
        <a href="support.html">Support</a>
    </div>

    <div class="main-content">
        <section>
            <h2>User Management</h2>
            <div class="table-heading">Manage Users</div>
            <div class="button-group">
                <button>View User</button>
                <button>Block User</button>
                <button>Remove User</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>John Doe</td>
                        <td>johndoe@example.com</td>
                        <td>Admin</td>
                        <td>Active</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jane Smith</td>
                        <td>janesmith@example.com</td>
                        <td>User</td>
                        <td>Blocked</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="chart-container">
            <h2>Site Analytics</h2>
            <canvas id="line-chart" width="400" height="200"></canvas>
        </section>

        <section class="chart-container">
            <h2>Activity Calendar</h2>
            <canvas id="calendar-chart" width="400" height="200"></canvas>
        </section>

    </div>

    <script>
        const lineCtx = document.getElementById('line-chart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: ['January', 'February', 'March', 'April', 'May', 'June'],
                datasets: [{
                    label: 'Monthly Active Users',
                    data: [15, 25, 30, 45, 50, 70],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const calendarCtx = document.getElementById('calendar-chart').getContext('2d');
        new Chart(calendarCtx, {
            type: 'bar',
            data: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                datasets: [{
                    label: 'User Activity',
                    data: [50, 75, 100, 125],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
